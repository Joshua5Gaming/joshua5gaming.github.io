<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Joshh.my.id</title>

  <style>
    :root {
      --bg-color: #000;
      --text-color: #f2f2f2;
      --link-color: #4ea1ff;
    }

    .light-mode {
      --bg-color: #f2f2f2;
      --text-color: #000;
      --link-color: #0066cc;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
      transition: background-color 0.3s, color 0.3s;
    }

    a {
      color: var(--link-color);
      text-decoration: none;
      font-weight: bold;
      transition: color 0.3s;
    }

    a:hover {
      text-decoration: underline;
    }

    #theme-toggle {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      margin-bottom: 24px;
    }

    #theme-toggle img {
      width: 128px;
      height: auto;
      transition: transform 0.3s;
    }

    .domain {
      margin-top: 8px;
      font-size: 14px;
      color: #888;
      opacity: 0.8;
    }
  </style>
</head>

<body>
  <!-- Theme Toggle -->
  <button id="theme-toggle" title="Toggle theme">
    <img id="toggle-icon" src="button-dark.png" alt="Toggle Theme">
  </button>

  <!-- Main Content -->
  <h1>Hi, I'm <a href="/about.html">Joshh(ua)</a></h1>
  <p class="domain">joshh.my.id</p>

  <script>
    const toggleBtn = document.getElementById('theme-toggle');
    const toggleIcon = document.getElementById('toggle-icon');
    const storedTheme = localStorage.getItem('theme');

    function setTheme(mode) {
      if (mode === 'light') {
        document.body.classList.add('light-mode');
        toggleIcon.src = 'button-light.png';
      } else {
        document.body.classList.remove('light-mode');
        toggleIcon.src = 'button-dark.png';
      }
    }

    // Initialize theme
    if (storedTheme === 'light') {
      setTheme('light');
    } else {
      setTheme('dark');
    }

    toggleBtn.addEventListener('click', () => {
      const isLight = document.body.classList.contains('light-mode');
      const newTheme = isLight ? 'dark' : 'light';
      setTheme(newTheme);
      localStorage.setItem('theme', newTheme);
    });
  </script>
</body>
</html>
